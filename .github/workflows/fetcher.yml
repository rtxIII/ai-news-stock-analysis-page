name: auto-news-fetcher-daily

on:
  schedule:
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    #
    # 📝 修改运行时间：只改第一个数字（0-59），表示每小时第几分钟运行
    # 📝 Change time: Only modify the first number (0-59) = minute of each hour
    #
    # 示例 / Examples:
    #   "15 * * * *"     → 每小时第15分钟 / minute 15 every hour
    #   "30 0-14 * * *"  → 北京时间 8:00-22:00 每小时第30分钟 / Beijing 8am-10pm
    #
    - cron: "15 0,6 * * *"

  workflow_dispatch:
    inputs:
      TrendRadar_Version:
        required: true
        type: string
        description: "TrendRadar Version"
        default: "6.8.0"

concurrency:
  group: fetcher-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write  # 需要write权限以提交更新
  actions: write

jobs:
  fetcher:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: deepseek
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Set up Python
        if: success()
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Set TrendRadar Version
        id: set-version
        run: |
          if [ -z "${{ inputs.TrendRadar_Version }}" ]; then
            echo "TRENDRADAR_VERSION=6.8.0" >> $GITHUB_OUTPUT
            echo "📦 Using default version: 6.8.0 (scheduled run)"
          else
            echo "TRENDRADAR_VERSION=${{ inputs.TrendRadar_Version }}" >> $GITHUB_OUTPUT
            echo "📦 Using input version: ${{ inputs.TrendRadar_Version }}"
          fi

      - name: Install dependencies
        if: success()
        run: |
          python -m pip install --upgrade pip
          curl -L https://github.com/sansan0/TrendRadar/archive/refs/tags/v${{ steps.set-version.outputs.TRENDRADAR_VERSION }}.tar.gz -o trend/TrendRadar-${{ steps.set-version.outputs.TRENDRADAR_VERSION }}.tar.gz
          tar -zxvf trend/TrendRadar-${{ steps.set-version.outputs.TRENDRADAR_VERSION }}.tar.gz
          cd TrendRadar-${{ steps.set-version.outputs.TRENDRADAR_VERSION }} 
          pip install -r requirements.txt
          mv trendradar/ ../
          cd ../

      - name: Verify required files
        if: success()
        run: |
          if [ ! -f config/config.yaml ]; then
            echo "Error: Config missing"
            exit 1
          fi

      - name: Run fetcher
        if: success()
        env:
          FEISHU_WEBHOOK_URL: ${{ vars.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          DINGTALK_WEBHOOK_URL: ${{ vars.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ vars.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ vars.WEWORK_MSG_TYPE }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ vars.EMAIL_TO }}
          EMAIL_SMTP_SERVER: ${{ vars.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ vars.EMAIL_SMTP_PORT }}
          NTFY_TOPIC: ${{ vars.NTFY_TOPIC }}
          NTFY_SERVER_URL: ${{ vars.NTFY_SERVER_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          #BARK_URL: ${{ vars.BARK_URL }}
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          STORAGE_BACKEND: auto
          LOCAL_RETENTION_DAYS: ${{ vars.LOCAL_RETENTION_DAYS }}
          REMOTE_RETENTION_DAYS: ${{ vars.REMOTE_RETENTION_DAYS }}
          S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ vars.S3_ENDPOINT_URL }}
          S3_REGION: ${{ vars.S3_REGION }}
          GITHUB_ACTIONS: true
          # AI 分析配置
          AI_ANALYSIS_ENABLED: true
          AI_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AI_PROVIDER: deepseek
          AI_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run:  |
          python -m trendradar
          python markdown.py

      - name: Commit and push updates
        if: success()
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git config pull.rebase true
          git pull origin main

          # 添加可能更新的文件
          git add config/frequency_words.txt || true
          git add page/src/content/post/ || true
          git add trend/TrendRadar-${{ steps.set-version.outputs.TRENDRADAR_VERSION }}.tar.gz || true

          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto update: frequency words and markdown reports"
            git push
            echo "✅ Changes committed and pushed"
          fi

      - name: Trigger generate-site workflow
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run generate-site.yml --ref ${{ github.ref_name }}
